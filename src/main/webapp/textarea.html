<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusGPT</title>
    <style>
        :root {
            --primary-color: #005A9C;
            --user-bubble-color: #005A9C;
            --llm-bubble-color: #F1F1F1;
            --background-color: #F9F9F9;
            --text-color: #333;
            --light-text-color: #FFF;
            --border-color: #E0E0E0;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --sidebar-width: 260px;
            --sidebar-bg: #0a1628;
            --sidebar-text: rgba(255,255,255,0.72);
            --sidebar-hover: rgba(255,255,255,0.08);
            --sidebar-active: rgba(0,90,156,0.45);
            --chat-bg: white;
            --header-bg: white;
            --input-bg: white;
            --message-user-bg: #005A9C;
            --message-llm-bg: #F1F1F1;
            --welcome-text: #555;
        }

        /* Dark mode variables */
        body.dark-mode {
            --primary-color: #4A9EFF;
            --user-bubble-color: #4A9EFF;
            --llm-bubble-color: #2C2C2C;
            --background-color: #1a1a1a;
            --text-color: #E0E0E0;
            --light-text-color: #FFF;
            --border-color: #3A3A3A;
            --sidebar-bg: #0A0E17;
            --sidebar-text: rgba(255,255,255,0.65);
            --sidebar-hover: rgba(255,255,255,0.05);
            --sidebar-active: rgba(74,158,255,0.25);
            --chat-bg: #252525;
            --header-bg: #2A2A2A;
            --input-bg: #2A2A2A;
            --message-user-bg: #4A9EFF;
            --message-llm-bg: #2C2C2C;
            --welcome-text: #B0B0B0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family);
            background-color: var(--background-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background-color 0.3s ease;
        }

        /* ── App Shell ── */
        .app-shell {
            width: 95%;
            max-width: 1100px;
            height: 95vh;
            max-height: 900px;
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .sidebar-header {
            padding: 1.1rem 1rem 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-logo {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .new-chat-side-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .new-chat-side-btn:hover { background: rgba(255,255,255,0.18); }

        .sidebar-section-label {
            padding: 1rem 1rem 0.4rem;
            font-size: 0.68rem;
            font-weight: 600;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 0 0.5rem 1rem;
        }

        .chat-history::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-track { background: transparent; }
        .chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

        .history-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.55rem 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            color: var(--sidebar-text);
            font-size: 0.84rem;
            transition: background 0.15s, color 0.15s;
            position: relative;
        }
        .history-item:hover { background: var(--sidebar-hover); color: #fff; }
        .history-item.active { background: var(--sidebar-active); color: #fff; }

        .history-item svg { flex-shrink: 0; opacity: 0.6; }
        .history-item .title {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .history-item .delete-btn {
            display: none;
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.9rem;
            line-height: 1;
        }
        .history-item:hover .delete-btn { display: block; }
        .history-item .delete-btn:hover { color: #ff6b6b; background: rgba(255,107,107,0.12); }

        .history-empty {
            padding: 1rem 0.75rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.28);
            font-style: italic;
        }

        /* ── Main Chat ── */
        .chat-container {
            flex: 1;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .chat-header {
            padding: 1rem 1.25rem;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .header-title h1 {
            font-size: 1.15rem;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-title h1 span {
            font-weight: 400;
            font-size: 0.78rem;
            color: #888;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .theme-toggle:hover {
            background: rgba(0,0,0,0.05);
        }

        body.dark-mode .theme-toggle:hover {
            background: rgba(255,255,255,0.1);
        }

        .logout-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: background-color 0.2s;
        }
        .logout-btn:hover {
            background-color: #c82333;
        }

        .new-chat-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: background-color 0.2s;
        }
        .new-chat-btn:hover { background-color: #004170; }

        .message-area {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .welcome-screen {
            text-align: center;
            margin: auto;
            color: var(--welcome-text);
        }
        .welcome-screen .logo { font-size: 3rem; }
        .welcome-screen h2 { font-size: 1.5rem; color: var(--text-color); margin: 0.5rem 0; }

        .example-prompts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        .prompt-card {
            background-color: var(--llm-bubble-color);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 0.9rem;
            text-align: left;
            font-family: var(--font-family);
            color: var(--text-color);
        }
        .prompt-card:hover { background-color: var(--border-color); }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            max-width: 85%;
        }
        .message .avatar { font-size: 1.5rem; margin-top: 5px; }
        .message .text-bubble {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            line-height: 1.5;
        }

        .llm-message { align-self: flex-start; }
        .llm-message .text-bubble {
            background-color: var(--message-llm-bg);
            color: var(--text-color);
            border-top-left-radius: 0;
        }

        .user-message { align-self: flex-end; flex-direction: row-reverse; }
        .user-message .avatar { display: none; }
        .user-message .text-bubble {
            background-color: var(--message-user-bg);
            color: var(--light-text-color);
            border-top-right-radius: 0;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background-color: #999;
            animation: typing 1s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.1s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.2s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        .input-area {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            background-color: var(--input-bg);
            transition: background-color 0.3s ease;
        }

        .input-area textarea {
            flex-grow: 1;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: none;
            font-family: inherit;
            font-size: 1rem;
            max-height: 100px;
            background-color: var(--input-bg);
            color: var(--text-color);
        }
        .input-area textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0,90,156,0.2);
        }

        .send-btn {
            background-color: var(--primary-color);
            border: none;
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover { background-color: #004170; }
        .send-btn svg { width: 20px; height: 20px; fill: white; }
        .send-btn:disabled { background-color: #B0B0B0; cursor: not-allowed; }

        @media (max-width: 640px) {
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

<div class="app-shell">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🎓 CampusGPT</div>
            <button class="new-chat-side-btn" onclick="newChat()">+ New</button>
        </div>

        <div class="sidebar-section-label">Recent</div>
        <div class="chat-history" id="chat-history">
            <div class="history-empty" id="history-empty">No chats yet</div>
        </div>
    </aside>

    <!-- ── Main Chat ── -->
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-title">
                <h1>🎓 CampusGPT <span>Your AI Campus Assistant</span></h1>
            </div>
            <div class="header-buttons">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeToggleBtn">🌙 Dark</button>
                <button class="logout-btn" onclick="logout()">Logout</button>
                <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
            </div>
        </header>

        <main class="message-area" id="message-area"></main>

        <footer class="input-area">
            <textarea id="user-input" placeholder="Ask about courses, deadlines, campus life..." rows="1"></textarea>
            <button id="send-btn" class="send-btn" disabled>
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </footer>
    </div>

</div>

<script>
	const messageArea   = document.getElementById('message-area');
	const userInput     = document.getElementById('user-input');
	const sendBtn       = document.getElementById('send-btn');
	const chatHistory   = document.getElementById('chat-history');
	const historyEmpty  = document.getElementById('history-empty');
	
	let sessions = [];
	let activeId = null;
	
	const welcomeScreenHTML = `
	<div class="welcome-screen">
	    <div class="logo">🎓</div>
	    <h2>Welcome to CampusGPT!</h2>
	    <p>How can I help you navigate college life today?</p>
	</div>`;
	
	function newChat() {
	    activeId = null;
	    messageArea.innerHTML = welcomeScreenHTML;
	    userInput.value = '';
	    sendBtn.disabled = true;
	    renderSidebar();
	}
	
	function renderSidebar() {
	    [...chatHistory.querySelectorAll('.history-item')].forEach(el => el.remove());
	
	    if (sessions.length === 0) {
	        historyEmpty.style.display = 'block';
	        return;
	    }
	
	    historyEmpty.style.display = 'none';
	
	    [...sessions].reverse().forEach(session => {
	        const item = document.createElement('div');
	        item.className = 'history-item' + (session.id === activeId ? ' active' : '');
	        item.innerHTML = `<span class="title">${escapeHtml(session.title)}</span>`;
	        item.onclick = () => loadSession(session.id);
	        chatHistory.appendChild(item);
	    });
	}
	
	function loadSession(id) {
	    const session = sessions.find(s => s.id === id);
	    if (!session) return;
	
	    activeId = id;
	    messageArea.innerHTML = '';
	
	    session.messages.forEach(m => renderBubble(m.role, m.text));
	    renderSidebar();
	}
	
	function getOrCreateSession(firstMessage) {
	    if (activeId) return sessions.find(s => s.id === activeId);
	
	    const id = 'sess_' + Date.now();
	    const session = {
	        id,
	        title: firstMessage.substring(0, 30),
	        messages: []
	    };
	
	    sessions.push(session);
	    activeId = id;
	    return session;
	}
	
	function renderBubble(role, text) {
	    if (document.querySelector('.welcome-screen')) messageArea.innerHTML = '';
	
	    const div = document.createElement('div');
	    div.classList.add('message', role === 'user' ? 'user-message' : 'llm-message');
	
	    div.innerHTML = role === 'user'
	        ? `<div class="text-bubble">${escapeHtml(text)}</div>`
	        : `<div class="avatar">🎓</div><div class="text-bubble">${escapeHtml(text)}</div>`;
	
	    messageArea.appendChild(div);
	    messageArea.scrollTop = messageArea.scrollHeight;
	}
	
	function escapeHtml(str) {
	    return str.replace(/&/g,'&amp;')
	              .replace(/</g,'&lt;')
	              .replace(/>/g,'&gt;');
	}
	
	userInput.addEventListener('input', () => {
	    sendBtn.disabled = userInput.value.trim() === '';
	});
	
	sendBtn.addEventListener('click', sendMessage);
	
	userInput.addEventListener('keydown', e => {
	    if (e.key === 'Enter' && !e.shiftKey) {
	        e.preventDefault();
	        sendMessage();
	    }
	});
	
	function sendMessage() {
	    const query = userInput.value.trim();
	    if (!query) return;
	
	    const session = getOrCreateSession(query);
	
	    session.messages.push({ role: 'user', text: query });
	    renderBubble('user', query);
	
	    userInput.value = '';
	    sendBtn.disabled = true;
	    renderSidebar();
	
	    // ✅ FIX: pass query properly
	    showTypingIndicator(session, query);
	}
	
	async function showTypingIndicator(session, userMessage) {
	
	    const indicator = document.createElement('div');
	    indicator.id = 'typing-indicator';
	    indicator.classList.add('message', 'llm-message');
	    indicator.innerHTML = `
	        <div class="avatar">🎓</div>
	        <div class="text-bubble">
	            <div class="typing-indicator">
	                <span></span><span></span><span></span>
	            </div>
	        </div>`;
	
	    messageArea.appendChild(indicator);
	    messageArea.scrollTop = messageArea.scrollHeight;
	
	    try {
	        const res = await fetch("http://localhost:8080/College_Enquiry_Chatbot/chat", {
	            method: "POST",
	            headers: {
	                "Content-Type": "application/x-www-form-urlencoded"
	            },
	            body: "message=" + encodeURIComponent(userMessage)
	        });
	
	        // ❗ IMPORTANT: check response
	        if (!res.ok) throw new Error("Server not reachable");
	
	        const data = await res.json();
	
	        document.getElementById('typing-indicator')?.remove();
	
	        const botReply = data.response || "No response from server";
	
	        session.messages.push({ role: 'llm', text: botReply });
	        renderBubble('llm', botReply);
	
	    } catch (err) {
	
	        document.getElementById('typing-indicator')?.remove();
	
	        const errorMsg = "⚠️ Server error. Check backend / Flask.";
	
	        session.messages.push({ role: 'llm', text: errorMsg });
	        renderBubble('llm', errorMsg);
	
	        console.error(err);
	    }
	}
	
	function toggleTheme() {
	    document.body.classList.toggle('dark-mode');
	}
	
	function logout() {
	    window.location.href = 'login.html';
	}
	
	newChat();
</script>
</body>
</html>
