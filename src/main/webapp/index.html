<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html,body{
  width: 100%;
  height: 100%;

  display: flex;
  justify-content: center;
  align-items: center;
}
.category_page{
height: 60%;
width: 60%;
background-color: #374186;
position: relative;
z-index: 1; 
border-radius: 5px;
opacity: 0.6;
text-align: center;
display: flex;
flex-direction: column;
justify-content: space-between;
}

.typing {
  font-family: 'Montserrat', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  font-size: 3rem;
  font-weight: 700;
  letter-spacing: 1px;
  line-height: 1.2;
  color: #ffffff; 
  text-align: center;
  width: 0;
  overflow: hidden;
  white-space: nowrap;
  border-right: 3px solid black;
  font-family: monospace;
  font-size: 24px;

  animation: typing 4s steps(30) forwards,
             blink 4s step-end forwards; 
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  0%, 100% { border-color: black; }
  50% { border-color: transparent; }
}
#bg-video {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  width: auto;
  height: auto;
  z-index: -1; 
  object-fit: cover; 
}

.category_btn{
  display: flex;
  justify-content: center;
  align-items: center;
  background-color:#020202 ;
 width: 30px;
 height: 30px;
 font-size: 20px;
 padding: 10px 20px;
 color: aliceblue;
}
.tick_div {
  background-color: #000000;
  width: 100%;
  height: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  color: white;
}


.radio-group {
  display: none; 
  align-items: center;
  gap: 15px;
}


.radio-group.show {
  display: flex;
}

.radio-label {
  cursor: pointer;
  font-size: 14px;
}


.category_btn2{
  display: flex;
  justify-content: center;
  align-items: center;
  background-color:#41754e ;
 width: fit-content;
 height: fit-content;
border-radius: 10px;
 font-size: 20px;
 padding: 8px 15px;
 color: aliceblue;
 text-decoration: none;
}
.category_btn2:hover{
  background-color:#28a748
}
  </style>
</head>
<body>
  
  <video autoplay muted loop playsinline id="bg-video">
    <source src="campus_gpt_bg.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>


  <div class="category_page">
    <h1 class="typing">WELCOME TO CAMPUS GPT</h1>
    <div class="tick_div">
   
      <button class="category_btn" id="toggleBtn">💬</button>
      
   
      <div class="radio-group" id="radioContainer">
        <label class="radio-label">
          <input type="radio" required name="category" value="student"> STUDENT
        </label>
        <label class="radio-label">
          <input type="radio" name="category" value="guest"> GUEST
        </label>
        <label class="radio-label">
          <input type="radio" name="category" value="faculty"> FACULTY
        </label>
        <a href="" class="btn category_btn2">CONTINUE</a>
      </div>
    </div>
    
    
  </div>
  <script >
    const toggleBtn = document.getElementById('toggleBtn');
const radioContainer = document.getElementById('radioContainer');

toggleBtn.addEventListener('click', () => {

  radioContainer.classList.toggle('show');
});
let inp=document.querySelectorAll('input');
// console.log(inp)
let con = document.querySelector('a');
con.addEventListener('click',function(evt){
  // evt.preventDefault();
  const selected = document.querySelector('input[name="category"]:checked');
    if(selected.value=='student'){
      con.href='studentlogin.html';
    }
    if(selected.value=='guest'){
      con.href='guestlogin.html';
    }
    if(selected.value=='faculty'){
      con.href='facultylogin.html';
    }


});
  </script>
</body>
</html>
